primary_region = 'iad'

[build]

# Applies pending Prisma migrations in a temporary machine before the main
# release rolls out. Reads DATABASE_URL_MIGRATION (direct, port 5432) — set
# via fly secrets. Failure here aborts the deploy. Idempotent: a deploy with
# no pending migrations is a fast no-op. Both api and workers run db:migrate so
# either app can be deployed in any order without coupling schema drift to
# deploy ordering.
#
# Seeding (api only — keep workers as migrate-only so two release machines
# don't seed concurrently): after migrations, runs the compiled bootstrap seed
# (default workspace, RBAC roles, admin user from ADMIN_EMAIL/ADMIN_PASSWORD,
# default site). The seed self-guards — it skips when the DB already has users —
# so it's safe to run on every deploy: it bootstraps an empty tenant DB on the
# first deploy and is a fast no-op thereafter. A seed failure aborts the deploy.
[deploy]
release_command = "sh -c 'pnpm -w db:migrate && node dist/seed.js'"

[processes]
app = 'node dist/main.js'

# DEV_CYCLE_SIMULATOR is local-dev only — never set it in any fly tenant
# config. On fly, cycles ALWAYS come from workers/processor (MQTT ingest).
[env]
NODE_ENV = 'production'
PORT = '3000'

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 0
processes = ['app']

[http_service.machine]
idle_timeout = "30m"

[http_service.concurrency]
type = 'requests'
hard_limit = 250
soft_limit = 200

[[http_service.checks]]
interval = '10s'
timeout = '2s'
grace_period = '5s'
method = 'GET'
path = '/health'

[[vm]]
memory = '512mb'
cpu_kind = 'shared'
cpus = 1
