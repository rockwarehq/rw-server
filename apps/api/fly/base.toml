primary_region = 'iad'

[build]

# Applies pending Prisma migrations in a temporary machine before the main
# release rolls out. Reads DATABASE_URL_MIGRATION (direct, port 5432) — set
# via fly secrets. Failure here aborts the deploy. Idempotent: a deploy with
# no pending migrations is a fast no-op. Both api and workers run this so
# either app can be deployed in any order without coupling schema drift to
# deploy ordering.
[deploy]
release_command = 'pnpm -w db:migrate'

[processes]
app = 'node dist/main.js'

# DEV_CYCLE_SIMULATOR is local-dev only — never set it in any fly tenant
# config. On fly, cycles ALWAYS come from workers/processor (MQTT ingest).
[env]
NODE_ENV = 'production'
PORT = '3000'

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 0
processes = ['app']

[http_service.machine]
idle_timeout = "30m"

[http_service.concurrency]
type = 'requests'
hard_limit = 250
soft_limit = 200

[[http_service.checks]]
interval = '10s'
timeout = '2s'
grace_period = '5s'
method = 'GET'
path = '/health'

[[vm]]
memory = '512mb'
cpu_kind = 'shared'
cpus = 1
