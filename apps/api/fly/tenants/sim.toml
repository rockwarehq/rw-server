app = 'sim-api'

# Fly secrets (set via flyctl secrets set -a sim-api):
# - DATABASE_URL
# - REDIS_URL
# - JWT_SECRET
# - MQTT_GATEWAY_REALY_URL
# - MQTT_GATEWAY_REALY_USER
# - MQTT_GATEWAY_REALY_PASSWORD
[_meta]
required_secrets = ['DATABASE_URL', 'REDIS_URL', 'JWT_SECRET', 'RESEND_API_KEY', 'MQTT_GATEWAY_REALY_URL', 'MQTT_GATEWAY_REALY_USER', 'MQTT_GATEWAY_REALY_PASSWORD']
domain = 'sim-api.rockware.io'

[env]
HOST = '0.0.0.0'
LOG_LEVEL = 'debug'
APP_BASE_URL = 'https://sim.rockware.io'
BUCKET_NAME = 'rw-sim'

[[http_service.checks]]
interval = '10s'
timeout = '2s'
grace_period = '30s'
method = 'GET'
path = '/health'
