primary_region = 'iad'

[build]

# Applies pending Prisma migrations in a temporary machine before the main
# release rolls out. Reads DATABASE_URL_MIGRATION (direct, port 5432) — set
# via fly secrets. Failure here aborts the deploy. Idempotent: a deploy with
# no pending migrations is a fast no-op. Both api and workers run this so
# either app can be deployed in any order without coupling schema drift to
# deploy ordering.
[deploy]
release_command = 'pnpm -w db:migrate'

# Single process group — scale with:
#   fly scale count -a <tenant>-workers rollups=1
[processes]
rollups = 'node dist/main.js --worker rollups'

[env]
NODE_ENV = 'production'
PORT = '9465'
# Metrics combined-tick interval (ms), read by the `rollups` process only.
# Default 5000; raise to reduce Redis pub/sub bandwidth at the cost of staler KPIs.
# COMBINED_TICK_MS = '5000'

# Internal-only healthcheck (no public HTTP).
[[services]]
internal_port = 9465
protocol = 'tcp'
processes = ['rollups']

  [[services.tcp_checks]]
  interval = '15s'
  timeout = '2s'
  grace_period = '30s'

  [[services.http_checks]]
  interval = '15s'
  timeout = '2s'
  grace_period = '30s'
  method = 'GET'
  path = '/healthz'

[[vm]]
memory = '512mb'
cpu_kind = 'shared'
cpus = 1
