primary_region = 'iad'

[build]

# Applies pending Prisma migrations in a temporary machine before the main
# release rolls out. Reads DATABASE_URL_MIGRATION (direct, port 5432) — set
# via fly secrets. Failure here aborts the deploy. Idempotent: a deploy with
# no pending migrations is a fast no-op. Both api and workers run this so
# either app can be deployed in any order without coupling schema drift to
# deploy ordering.
[deploy]
release_command = 'pnpm -w db:migrate'

# Process groups — keep each at exactly ONE machine. These are singletons:
# imm-events records cycles, so a second consumer would double-record; a second
# gateway-health would emit duplicate metric series. The deploy script passes
# --ha=false (one machine per group) AND reconciles every group to =1 after each
# workers deploy (see scripts/fly-deploy.ts pinWorkerScale), so no manual
# `fly scale count` is needed. Never scale a group above 1.
[processes]
rollups = 'node dist/main.js --worker rollups'
# Records cycles from livestore imm events; pooled (pgbouncer) DATABASE_URL.
imm-events = 'node dist/main.js --worker imm-events'
# Mirrors gateway.health.* NATS reports into prom-client gauges at /metrics.
# Needs only NATS_URL. Keep at 1 machine: extra instances just emit duplicate
# series (distinguished by Fly's instance label) — harmless but noisy.
gateway-health = 'node dist/main.js --worker gateway-health'

[env]
NODE_ENV = 'production'
PORT = '9465'
# Metrics combined-tick interval (ms), read by the `rollups` process only.
# Default 5000; raise to reduce Redis pub/sub bandwidth at the cost of staler KPIs.
# COMBINED_TICK_MS = '5000'

# Fly's managed Prometheus scrapes this app-wide on every worker machine. Each
# worker serves default process metrics; gateway-health additionally serves the
# gateway_* gauges. -> Grafana (fly-metrics.net).
[metrics]
port = 9465
path = '/metrics'

# Internal-only healthcheck (no public HTTP).
[[services]]
internal_port = 9465
protocol = 'tcp'
processes = ['rollups', 'imm-events', 'gateway-health']

  [[services.tcp_checks]]
  interval = '15s'
  timeout = '2s'
  grace_period = '30s'

  [[services.http_checks]]
  interval = '15s'
  timeout = '2s'
  grace_period = '30s'
  method = 'GET'
  path = '/healthz'

[[vm]]
memory = '512mb'
cpu_kind = 'shared'
cpus = 1
