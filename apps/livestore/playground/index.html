<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Livestore — live rollup</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; font: 14px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #0e1116; color: #e6edf3; padding: 24px;
      }
      h1 { font-size: 16px; margin: 0 0 4px; }
      .sub { color: #8b949e; margin: 0 0 20px; }
      .status { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
      .status.ok { background: #11331c; color: #4ac26b; }
      .status.off { background: #3a1620; color: #f06a78; }
      .card {
        border: 1px solid #2a2f37; border-radius: 8px; padding: 12px 14px; margin: 8px 0;
        transition: background 0.5s ease; background: #161b22;
      }
      .card.flash { background: #1f6feb33; transition: background 0s; }
      .row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
      .name { font-weight: 600; }
      .value { font-size: 20px; font-variant-numeric: tabular-nums; }
      .meta { color: #8b949e; font-size: 12px; }
      .site .value { font-size: 30px; color: #58a6ff; }
      .wc .value { font-size: 24px; color: #79c0ff; }
      .q { padding: 1px 6px; border-radius: 6px; font-size: 11px; text-transform: uppercase; }
      .q-good { background: #11331c; color: #4ac26b; }
      .q-uncertain { background: #3a2e10; color: #d2a73a; }
      .q-stale { background: #21262d; color: #8b949e; }
      .q-bad { background: #3a1620; color: #f06a78; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
      .section-label { color: #8b949e; margin: 18px 0 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
      .indent { margin-left: 18px; }
    </style>
  </head>
  <body>
    <h1>Livestore — <code>shift_goodItems</code> live rollup</h1>
    <p class="sub">station → workcenter → site, reactive. <span id="status" class="status off">connecting…</span></p>

    <div class="section-label">Site</div>
    <div id="site"></div>
    <div class="section-label">Workcenter</div>
    <div id="workcenter" class="indent"></div>
    <div class="section-label">Stations (under the workcenter)</div>
    <div id="stations" class="grid indent"></div>

    <script>
      const PROP = "shift_goodItems";
      const STATION_LIMIT = 8;
      const cards = new Map(); // propertyId -> { el, valueEl, metaEl }
      const statusEl = document.getElementById("status");

      function quality(q) {
        return `<span class="q q-${q}">${q}</span>`;
      }
      function makeCard(container, node, cls) {
        const el = document.createElement("div");
        el.className = `card ${cls}`;
        el.innerHTML = `<div class="row"><span class="name">${node.name}</span><span class="value" data-v>—</span></div>
                        <div class="meta" data-m></div>`;
        container.appendChild(el);
        return { el, valueEl: el.querySelector("[data-v]"), metaEl: el.querySelector("[data-m]") };
      }
      function render(propertyId, env) {
        const c = cards.get(propertyId);
        if (!c) return;
        c.valueEl.textContent = env.value == null ? "—" : env.value;
        const cov = env.context && env.context.present != null ? ` · ${env.context.present}/${env.context.childCount} reporting` : "";
        c.metaEl.innerHTML = quality(env.quality) + cov;
        c.el.classList.remove("flash");
        void c.el.offsetWidth; // restart animation
        c.el.classList.add("flash");
      }

      function propId(node) {
        const p = (node.properties || []).find((p) => p.name === PROP);
        return p && p.id;
      }

      async function main() {
        const res = await fetch("/graph/nodes");
        const { data: nodes } = await res.json();

        const site = nodes.find((n) => n.kind === "Site" && !n.name.includes(" / "));
        const wc = nodes.find((n) => n.kind === "Workcenter");
        const wcPrefix = wc ? wc.name + " / " : null;
        const stations = nodes
          .filter((n) => n.kind === "Station" && wcPrefix && n.name.startsWith(wcPrefix))
          .sort((a, b) => a.name.localeCompare(b.name))
          .slice(0, STATION_LIMIT);

        const subs = [];
        const register = (node, container, cls) => {
          const id = propId(node);
          if (!id) return;
          const short = node.name.split(" / ").pop();
          cards.set(id, makeCard(container, { name: short || node.name }, cls));
          render(id, { value: null, quality: "stale" });
          subs.push(id);
        };
        if (site) register(site, document.getElementById("site"), "site");
        if (wc) register(wc, document.getElementById("workcenter"), "wc");
        for (const s of stations) register(s, document.getElementById("stations"), "station");

        const ws = new WebSocket(`ws://${location.host}/ws/graph`);
        ws.onopen = () => {
          statusEl.textContent = "live";
          statusEl.className = "status ok";
          ws.send(JSON.stringify({ op: "subscribe", propertyIds: subs }));
        };
        ws.onclose = () => {
          statusEl.textContent = "disconnected";
          statusEl.className = "status off";
        };
        ws.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          if (msg.op === "value") render(msg.propertyId, msg.envelope);
        };
      }
      main();
    </script>
  </body>
</html>
