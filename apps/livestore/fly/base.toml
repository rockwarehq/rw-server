primary_region = 'iad'

[build]

# Applies pending Prisma migrations in a temporary machine before the main
# release rolls out. Livestore owns runtime graph value propagation, but schema
# migrations still live in @rw/db with the rest of the monorepo.
[deploy]
release_command = 'pnpm -w db:migrate'

[processes]
app = 'node dist/main.js'

[env]
NODE_ENV = 'production'
HOST = '::'
PORT = '30100'

[http_service]
internal_port = 30100
force_https = true
auto_stop_machines = 'off'
auto_start_machines = true
min_machines_running = 1
processes = ['app']

[http_service.concurrency]
type = 'requests'
hard_limit = 250
soft_limit = 200

[[http_service.checks]]
interval = '10s'
timeout = '2s'
grace_period = '10s'
method = 'GET'
path = '/readyz'

# Fly's managed Prometheus scrapes each machine directly (livestore is a Fly app
# on the private network) -> Grafana. Served by the Fastify server on the same
# port as the API. See apps/livestore/src/metrics.ts for the gauges.
[metrics]
port = 30100
path = '/metrics'

[[vm]]
memory = '512mb'
cpu_kind = 'shared'
cpus = 1
