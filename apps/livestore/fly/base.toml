primary_region = 'iad'

[build]

[processes]
app = 'node dist/main.js'

[env]
NODE_ENV = 'production'
HOST = '::'
PORT = '9470'

# Internal-only healthcheck (no public HTTP).
[[services]]
internal_port = 9470
protocol = 'tcp'
processes = ['app']

  [[services.tcp_checks]]
  interval = '15s'
  timeout = '2s'
  grace_period = '15s'

  [[services.http_checks]]
  interval = '15s'
  timeout = '2s'
  grace_period = '15s'
  method = 'GET'
  path = '/healthz'

[[vm]]
memory = '512mb'
cpu_kind = 'shared'
cpus = 1
